<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
    #term { height: 100%; width: 100%; }
    .xterm { padding: 4px; }
    /* The terminal must never be wider than the screen; xterm is sized to fit. */
    .xterm-viewport { overflow-x: hidden !important; }
  </style>
</head>
<body>
  <div id="term"></div>
  <script src="xterm.js"></script>
  <script>
    // The terminal grid is fitted to the WebView's width so a full line fits on
    // screen without horizontal scrolling. We compute how many character cells
    // fit, resize xterm to that grid, and report it to the native side, which
    // tells the daemon to resize the PTY (SIGWINCH) so claude's TUI reflows to
    // the same width. cols/rows here are therefore dynamic, not fixed.
    var term = new Terminal({
      // Generous scrollback so a long claude session's history stays scrollable
      // on the phone. ~20k lines is cheap in memory and comfortably exceeds the
      // daemon's ~1 MB reconnect-replay window.
      fontSize: 12,
      scrollback: 20000,
      disableStdin: false,
      convertEol: false,
      theme: { background: '#000000' }
    });
    var el = document.getElementById('term');
    term.open(el);

    var lastCols = 0, lastRows = 0;

    // Compute the cell grid that fits the container, mirroring xterm's FitAddon
    // (which is not bundled here). Uses the renderer's measured cell size.
    function proposeGeometry() {
      try {
        var core = term._core;
        var dims = core && core._renderService && core._renderService.dimensions;
        if (!dims || !dims.css || !dims.css.cell.width || !dims.css.cell.height) return null;
        var style = window.getComputedStyle(term.element);
        var padX = parseInt(style.paddingLeft || '0') + parseInt(style.paddingRight || '0');
        var padY = parseInt(style.paddingTop || '0') + parseInt(style.paddingBottom || '0');
        var availW = el.clientWidth - padX;
        var availH = el.clientHeight - padY;
        if (availW <= 0 || availH <= 0) return null;
        return {
          cols: Math.max(2, Math.floor(availW / dims.css.cell.width)),
          rows: Math.max(1, Math.floor(availH / dims.css.cell.height))
        };
      } catch (e) {
        return null;
      }
    }

    function fit() {
      var g = proposeGeometry();
      if (!g) return;
      if (g.cols === lastCols && g.rows === lastRows) return;
      lastCols = g.cols;
      lastRows = g.rows;
      term.resize(g.cols, g.rows);
      if (window.AndroidInput && AndroidInput.resize) AndroidInput.resize(g.cols, g.rows);
    }

    // Cell dimensions are only measurable after xterm's first render, which on
    // a WebView lags behind load / the ResizeObserver's first callback — so the
    // fit() calls below can all see null geometry and never report a size. Poll
    // fit() until it succeeds (lastCols becomes non-zero) so the PTY is sized to
    // the phone; otherwise claude renders at the default 80/120-col width and
    // wraps into an unreadable mess.
    var fitAttempts = 0;
    function ensureFit() {
      fit();
      if (lastCols === 0 && fitAttempts < 50) {
        fitAttempts++;
        setTimeout(ensureFit, 100);
      }
    }

    // The first render is the earliest reliable point the cell size exists;
    // fit() there. onRender fires often, but fit() early-returns when unchanged.
    term.onRender(function () { fit(); });

    // Refit whenever the WebView changes size (rotation, soft keyboard, the
    // control-key row toggling). ResizeObserver covers all of these.
    if (window.ResizeObserver) {
      new ResizeObserver(function () { fit(); }).observe(el);
    }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function () { setTimeout(fit, 100); });

    // Forward everything the user types (incl. control/escape sequences) to the
    // native side, which relays it over the WebSocket as an `input` frame.
    term.onData(function (d) {
      if (window.AndroidInput && AndroidInput.send) AndroidInput.send(d);
    });

    // --- Touch scrolling -------------------------------------------------
    // xterm.js converts the mouse wheel into scrollback scrolling but does NOT
    // handle touch drags: the screen/canvas overlays the scrollable viewport
    // and swallows the gesture, so on a phone the buffer cannot be scrolled at
    // all. We translate a one-finger vertical drag into term.scrollLines()
    // ourselves, and suppress the tap-to-focus that would otherwise fire when a
    // drag ends.
    var touchStartY = null, scrollAccum = 0, dragged = false;
    function cellHeight() {
      try {
        var d = term._core._renderService.dimensions;
        return (d && d.css && d.css.cell && d.css.cell.height) || 17;
      } catch (e) { return 17; }
    }
    el.addEventListener('touchstart', function (e) {
      if (e.touches.length !== 1) { touchStartY = null; return; }
      touchStartY = e.touches[0].clientY;
      scrollAccum = 0;
      dragged = false;
    }, { passive: true });
    el.addEventListener('touchmove', function (e) {
      if (touchStartY === null) return;
      var y = e.touches[0].clientY;
      // Finger moving down (positive delta) reveals older history (scroll up).
      scrollAccum += y - touchStartY;
      touchStartY = y;
      var h = cellHeight();
      var lines = Math.trunc(scrollAccum / h);
      if (lines !== 0) {
        scrollAccum -= lines * h;
        term.scrollLines(-lines);
        dragged = true;
        e.preventDefault(); // stop the WebView treating the drag as a tap
      }
    }, { passive: false });
    el.addEventListener('touchend', function () { touchStartY = null; });

    // Tapping (not dragging) focuses xterm's hidden textarea so the soft
    // keyboard opens and key events flow through onData.
    el.addEventListener('click', function () { if (!dragged) term.focus(); });

    // Bridge API called from Android via evaluateJavascript:
    window.termWrite = function (s) { term.write(s); };
    window.termReset = function () { term.reset(); };
    window.termFocus = function () { term.focus(); };
    window.termFit = function () { fit(); };
    // Force a resize report even if the grid is unchanged — used when the same
    // WebView is reused for a different session, whose new PTY still defaults to
    // the daemon's spawn size and must be told this phone's dimensions.
    window.termRefit = function () { lastCols = 0; lastRows = 0; fitAttempts = 0; ensureFit(); };

    // Kick off the retry loop; onRender (above) also drives it once the first
    // paint measures the cell size.
    ensureFit();
    window.__termReady = true;
  </script>
</body>
</html>
