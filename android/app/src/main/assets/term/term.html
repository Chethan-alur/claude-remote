<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    #term { height: 100%; width: 100%; }
    .xterm { padding: 4px; }
  </style>
</head>
<body>
  <div id="term"></div>
  <script src="xterm.js"></script>
  <script>
    // Dimensions match the daemon's PTY (rows=40, cols=120) so claude's TUI
    // lays out correctly. The terminal is interactive: keystrokes (chars,
    // backspace, Enter, arrows — xterm emits the right escape sequences) are
    // forwarded to the daemon via the AndroidInput bridge and written to the PTY.
    var term = new Terminal({
      cols: 120,
      rows: 40,
      fontSize: 10,
      scrollback: 5000,
      disableStdin: false,
      convertEol: false,
      theme: { background: '#000000' }
    });
    term.open(document.getElementById('term'));

    // Forward everything the user types (incl. control/escape sequences) to the
    // native side, which relays it over the WebSocket as an `input` frame.
    term.onData(function (d) {
      if (window.AndroidInput && AndroidInput.send) AndroidInput.send(d);
    });

    // Tapping the terminal focuses xterm's hidden textarea so the soft keyboard
    // opens and key events flow through onData.
    document.getElementById('term').addEventListener('click', function () {
      term.focus();
    });

    // Bridge API called from Android via evaluateJavascript:
    window.termWrite = function (s) { term.write(s); };
    window.termReset = function () { term.reset(); };
    window.termFocus = function () { term.focus(); };
    window.__termReady = true;
  </script>
</body>
</html>
